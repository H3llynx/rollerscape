<svg viewBox="0 0 200 200" width="120">

    <defs>
        <radialGradient id="tire" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFD000" />
            <stop offset="70%" stop-color="#FFC400" />
            <stop offset="100%" stop-color="#E6A800" />
        </radialGradient>

        <radialGradient id="rim" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#555" />
            <stop offset="100%" stop-color="#111" />
        </radialGradient>
    </defs>


    <circle cx="100" cy="100" r="90" fill="url(#tire)" />
    <circle cx="100" cy="100" r="70" fill="#000" />


    <circle cx="100" cy="100" r="60" fill="url(#rim)" />
    <circle cx="100" cy="100" r="40" fill="#111" />


    <circle cx="100" cy="100" r="28" fill="#333" />
    <circle cx="100" cy="100" r="10" fill="#000" />


    <g fill="#ccc">
        <circle cx="100" cy="72" r="4" />
        <circle cx="128" cy="100" r="4" />
        <circle cx="100" cy="128" r="4" />
        <circle cx="72" cy="100" r="4" />
        <circle cx="120" cy="80" r="4" />
        <circle cx="120" cy="120" r="4" />
        <circle cx="80" cy="120" r="4" />
        <circle cx="80" cy="80" r="4" />
    </g>


    <g stroke="#777" stroke-width="6" stroke-linecap="round">
        <line x1="100" y1="40" x2="100" y2="160" />
        <line x1="40" y1="100" x2="160" y2="100" />
        <line x1="60" y1="60" x2="140" y2="140" />
        <line x1="140" y1="60" x2="60" y2="140" />
    </g>
</svg>